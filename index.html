<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>感官测绘 · 存在痕迹生成器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Georgia', 'Noto Serif SC', serif;
  background: linear-gradient(135deg, #f5f0e8 0%, #e8e0d4 50%, #d4ccc0 100%);
  min-height: 100vh;
  padding: 2rem 1rem;
  color: #3a3530;
  line-height: 1.8;
}

.container {
  max-width: 680px;
  margin: 0 auto;
}

h1 {
  text-align: center;
  font-size: 1.8rem;
  font-weight: 400;
  letter-spacing: 0.15em;
  margin-bottom: 0.5rem;
  color: #2a2520;
}

.subtitle {
  text-align: center;
  font-size: 0.9rem;
  color: #7a7068;
  margin-bottom: 2.5rem;
  letter-spacing: 0.1em;
}

.card {
  background: rgba(255, 255, 255, 0.45);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 16px;
  padding: 2rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 8px 32px rgba(80, 60, 40, 0.08);
  transition: transform 0.3s ease;
}

.card:hover {
  transform: translateY(-2px);
}

.question-label {
  font-size: 1rem;
  margin-bottom: 1rem;
  color: #4a4038;
  font-weight: 500;
}

.options {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem;
  margin-bottom: 1rem;
}

.options label {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.5rem 1rem;
  background: rgba(255, 255, 255, 0.5);
  border: 1px solid rgba(180, 160, 140, 0.3);
  border-radius: 24px;
  cursor: pointer;
  font-size: 0.88rem;
  transition: all 0.25s ease;
}

.options label:hover {
  background: rgba(255, 255, 255, 0.8);
  border-color: rgba(140, 120, 100, 0.5);
}

.options input[type="radio"] {
  accent-color: #8a7060;
  width: 14px;
  height: 14px;
}

.options input[type="radio"]:checked + span {
  color: #5a4030;
  font-weight: 600;
}

.refrain {
  margin-top: 1rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.refrain-label {
  font-size: 0.85rem;
  color: #7a6a5a;
  white-space: nowrap;
}

.refrain input[type="text"] {
  flex: 1;
  border: none;
  border-bottom: 1px solid rgba(140, 120, 100, 0.4);
  background: transparent;
  font-family: inherit;
  font-size: 0.9rem;
  padding: 0.4rem 0;
  color: #3a3530;
  outline: none;
  transition: border-color 0.3s;
}

.refrain input[type="text"]:focus {
  border-bottom-color: #8a7060;
}

.refrain input[type="text"]::placeholder {
  color: #b0a090;
  font-style: italic;
}

.btn-row {
  display: flex;
  justify-content: center;
  gap: 1rem;
  margin-top: 1rem;
}

.btn {
  padding: 0.8rem 2.5rem;
  border: 1px solid rgba(140, 120, 100, 0.4);
  background: rgba(255, 255, 255, 0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 30px;
  font-family: inherit;
  font-size: 0.95rem;
  color: #4a4038;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 0.1em;
}

.btn:hover {
  background: rgba(255, 255, 255, 0.8);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(80, 60, 40, 0.1);
}

.btn-primary {
  background: rgba(120, 90, 60, 0.12);
  border-color: rgba(120, 90, 60, 0.3);
}

.btn-primary:hover {
  background: rgba(120, 90, 60, 0.2);
}

#result {
  display: none;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}

#result.show {
  opacity: 1;
  transform: translateY(0);
}

.result-card {
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255, 255, 255, 0.7);
  border-radius: 16px;
  padding: 2.5rem 2rem;
  box-shadow: 0 12px 40px rgba(80, 60, 40, 0.1);
  text-align: center;
  position: relative;
}

.poem {
  font-size: 1.1rem;
  line-height: 2.2;
  white-space: pre-line;
  color: #3a3028;
  letter-spacing: 0.05em;
}

.mute-btn {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: rgba(255, 255, 255, 0.5);
  border: 1px solid rgba(180, 160, 140, 0.3);
  border-radius: 50%;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.1rem;
  transition: all 0.25s ease;
}

.mute-btn:hover {
  background: rgba(255, 255, 255, 0.8);
}

.divider {
  width: 60px;
  height: 1px;
  background: rgba(140, 120, 100, 0.3);
  margin: 1.5rem auto;
}

@media (max-width: 600px) {
  body { padding: 1rem 0.6rem; }
  h1 { font-size: 1.4rem; }
  .card { padding: 1.5rem 1.2rem; }
  .options { flex-direction: column; }
  .options label { width: 100%; }
  .btn { padding: 0.7rem 1.8rem; font-size: 0.9rem; }
  .result-card { padding: 2rem 1.5rem; }
}

.submit-hint {
  display: block;
  margin-top: 0.5rem;
  font-size: 0.75rem;
  color: #a89b8e;
  opacity: 0;
  transition: opacity 0.5s;
}
</style>
</head>
<body>
<div class="container">
  <h1>感官测绘 · 存在痕迹生成器</h1>
  <p class="subtitle">五个问题，勾勒你的存在方式</p>

  <form id="surveyForm">
    <!-- Q1 -->
    <div class="card">
      <p class="question-label">1. 你手机相册的书名：</p>
      <div class="options">
        <label><input type="radio" name="q1" value="A"><span>暂停的瞬间</span></label>
        <label><input type="radio" name="q1" value="B"><span>散装生活</span></label>
        <label><input type="radio" name="q1" value="C"><span>被凝视的日常</span></label>
        <label><input type="radio" name="q1" value="D"><span>备忘录</span></label>
      </div>
      <div class="refrain">
        <span class="refrain-label">它的气味是？</span>
        <input type="text" id="scent" placeholder="比如：旧书页的霉味">
      </div>
    </div>

    <!-- Q2 -->
    <div class="card">
      <p class="question-label">2. 你倾诉的线通向：</p>
      <div class="options">
        <label><input type="radio" name="q2" value="A"><span>信号塔</span></label>
        <label><input type="radio" name="q2" value="B"><span>私人电台</span></label>
        <label><input type="radio" name="q2" value="C"><span>固定电话</span></label>
        <label><input type="radio" name="q2" value="D"><span>黑洞</span></label>
      </div>
      <div class="refrain">
        <span class="refrain-label">那头是什么天气？</span>
        <input type="text" id="weather" placeholder="比如：总是下雨的午夜">
      </div>
    </div>

    <!-- Q3 -->
    <div class="card">
      <p class="question-label">3. 你生活的触感：</p>
      <div class="options">
        <label><input type="radio" name="q3" value="A"><span>雾</span></label>
        <label><input type="radio" name="q3" value="B"><span>拼贴画</span></label>
        <label><input type="radio" name="q3" value="C"><span>砂纸</span></label>
        <label><input type="radio" name="q3" value="D"><span>积木</span></label>
      </div>
      <div class="refrain">
        <span class="refrain-label">它的BPM是？</span>
        <input type="text" id="bpm" placeholder="比如：72 或 很慢">
      </div>
    </div>

    <!-- Q4 -->
    <div class="card">
      <p class="question-label">4. 你的移动方式：</p>
      <div class="options">
        <label><input type="radio" name="q4" value="A"><span>漂浮</span></label>
        <label><input type="radio" name="q4" value="B"><span>闲逛</span></label>
        <label><input type="radio" name="q4" value="C"><span>骑行</span></label>
        <label><input type="radio" name="q4" value="D"><span>扎根</span></label>
      </div>
    </div>

    <!-- Q5 -->
    <div class="card">
      <p class="question-label">5. 你留下的痕迹，透明度是：</p>
      <div class="options">
        <label><input type="radio" name="q5" value="A"><span>几乎隐形</span></label>
        <label><input type="radio" name="q5" value="B"><span>淡淡水印</span></label>
        <label><input type="radio" name="q5" value="C"><span>铅笔素描</span></label>
        <label><input type="radio" name="q5" value="D"><span>浓厚油画</span></label>
      </div>
    </div>

    <div class="btn-row">
      <button type="button" class="btn btn-primary" onclick="generate()">生成痕迹</button>
      <button type="button" class="btn" onclick="resetAll()">重新开始</button>
    </div>
  </form>

  <div id="result">
    <div class="divider"></div>
    <div class="result-card">
      <button class="mute-btn" id="muteBtn" onclick="toggleMute()" title="静音/取消静音">🔊</button>
      <div class="poem" id="poemOutput"></div>
      <span class="submit-hint" id="submitHint"></span>
    </div>
  </div>
</div>

<audio id="tempoAudio" loop preload="none"></audio>

<script>
const lexicon = {
  1: { A:{subject:"一个收藏家",state:"暂停的",object:"截图"}, B:{subject:"一个旅人",state:"散装的",object:"碎片"}, C:{subject:"一个凝视者",state:"被凝视的",object:"日常"}, D:{subject:"一个书记员",state:"未命名的",object:"备忘录"} },
  2: { A:{subject:"一座孤岛",state:"用信号搭建的",object:"未发送的消息"}, B:{subject:"一个电台",state:"调频中的",object:"私人频率"}, C:{subject:"一间老屋",state:"根深蒂固的",object:"固定电话"}, D:{subject:"一个黑洞",state:"自我消化的",object:"没有回音的墙"} },
  3: { A:{subject:"一片雾",state:"伸手不见的",object:"水汽"}, B:{subject:"一幅拼贴画",state:"胶水未干的",object:"碎片"}, C:{subject:"一张砂纸",state:"持续摩擦的",object:"划痕"}, D:{subject:"一组积木",state:"严丝合缝的",object:"结构"} },
  4: { A:{subject:"一张充气床",state:"随波逐流的",object:"水纹"}, B:{subject:"一个徒步者",state:"无导航的",object:"脚印"}, C:{subject:"一个骑行手",state:"知道方向的",object:"车辙"}, D:{subject:"一棵树",state:"安静扩展的",object:"年轮"} },
  5: { A:{subject:"一扇玻璃",state:"快隐形的",object:"透明"}, B:{subject:"一层水印",state:"淡淡的",object:"痕迹"}, C:{subject:"一幅素描",state:"铅笔勾勒的",object:"轮廓"}, D:{subject:"一幅油画",state:"层层覆盖的",object:"厚重"} }
};

const defaultScent = ["旧书页的霉味","阳光晒过的棉布","雨后泥土的腥气","冷掉的咖啡渍","墨水的铁锈味","森林深处的潮湿"];
const defaultWeather = ["总是下雨的午夜","干燥而空旷的风","浓雾弥漫的清晨","暴风雪前的寂静","晴朗但很冷的午后","潮湿闷热的黄昏"];
const defaultBpmWords = { slow:["慢板的","沉缓的","静默的"], mid:["行进的","流动的","踱步的"], fast:["狂奔的","急促的","飞旋的"] };

const extraLines = [
  "你在场，但不留名。",
  "像一封寄给自己的信。",
  "存在本身就是一种回答。",
  "没有人知道你走过这里。",
  "你的沉默也是一种语言。",
  "风吹过的时候，你就在那里。",
  "不必解释，痕迹自会说话。",
  "你是自己最安静的观众。"
];

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function getAnswers() {
  const answers = {};
  for (let i = 1; i <= 5; i++) {
    const checked = document.querySelector(`input[name="q${i}"]:checked`);
    if (!checked) return null;
    answers[i] = checked.value;
  }
  return answers;
}

function parseBpm(input) {
  const trimmed = input.trim();
  if (!trimmed) {
    const categories = ['slow', 'mid', 'fast'];
    const cat = pick(categories);
    return { category: cat, tempoWord: pick(defaultBpmWords[cat]) };
  }
  const num = parseInt(trimmed, 10);
  if (!isNaN(num)) {
    if (num <= 60) return { category: 'slow', tempoWord: pick(defaultBpmWords.slow) };
    if (num <= 100) return { category: 'mid', tempoWord: pick(defaultBpmWords.mid) };
    return { category: 'fast', tempoWord: pick(defaultBpmWords.fast) };
  }
  // Non-numeric: random category, use input as tempo word
  const categories = ['slow', 'mid', 'fast'];
  const cat = pick(categories);
  return { category: cat, tempoWord: trimmed + "的" };
}


// Submit data to backend (fire and forget)
function submitToBackend(answers, scent, weather, bpm, poemText, extra, tempoWord, musicType) {
  const payload = {
    q1: answers[1],
    q2: answers[2],
    q3: answers[3],
    q4: answers[4],
    q5: answers[5],
    scent: scent || '',
    weather: weather || '',
    bpm: bpm || '',
    generated_poem: poemText,
    generated_extra: extra,
    tempo_word: tempoWord,
    music_type: musicType
  };
  fetch('https://h5-questionnaire-production.up.railway.app/api/sensory/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      const hint = document.getElementById('submitHint');
      if (hint) { hint.textContent = '已记录 ✓'; hint.style.opacity = '1'; }
    }
  })
  .catch(() => {});
}

function generate() {
  const answers = getAnswers();
  if (!answers) {
    alert("请先完成所有选择题～");
    return;
  }

  // Gather refrain inputs
  const scentInput = document.getElementById('scent').value.trim();
  const weatherInput = document.getElementById('weather').value.trim();
  const bpmInput = document.getElementById('bpm').value;

  const scent = scentInput || pick(defaultScent);
  const weather = weatherInput || pick(defaultWeather);
  const { category, tempoWord } = parseBpm(bpmInput);

  // Pick lexicon entries
  const picked = [];
  for (let i = 1; i <= 5; i++) {
    picked.push(lexicon[i][answers[i]]);
  }

  // Choose main entry from a random question
  const main = pick(picked);

  // Build poem
  const poem = `${tempoWord}
你是${main.subject}，
在${weather}里，
用${scent}的
${main.state}${main.object}。

${pick(extraLines)}`;

  // Show result with animation fix
  const resultEl = document.getElementById('result');
  const poemEl = document.getElementById('poemOutput');
  poemEl.textContent = poem;

  resultEl.style.display = 'block';
  resultEl.offsetHeight; // force reflow
  resultEl.classList.add('show');

  // Scroll to result
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Play audio
  playAudio(category);

  // Submit to backend
  const extraLine = poem.split('
').filter(l => l.trim()).pop();
  submitToBackend(answers, scent, weather, bpmInput, poem, extraLine, tempoWord, category);
}

function playAudio(category) {
  const audio = document.getElementById('tempoAudio');
  const src = `./music/${category}.mp3`;
  audio.src = src;
  audio.volume = 0.4;
  audio.play().catch(() => {});
  document.getElementById('muteBtn').textContent = '🔊';
}

function toggleMute() {
  const audio = document.getElementById('tempoAudio');
  const btn = document.getElementById('muteBtn');
  if (audio.muted) {
    audio.muted = false;
    btn.textContent = '🔊';
  } else {
    audio.muted = true;
    btn.textContent = '🔇';
  }
}

function resetAll() {
  // Stop audio
  const audio = document.getElementById('tempoAudio');
  audio.pause();
  audio.currentTime = 0;
  audio.src = '';

  // Hide result
  const resultEl = document.getElementById('result');
  resultEl.classList.remove('show');
  setTimeout(() => { resultEl.style.display = 'none'; }, 600);

  // Reset form
  document.getElementById('surveyForm').reset();

  // Clear submit hint
  const hint = document.getElementById('submitHint');
  if (hint) { hint.textContent = ''; hint.style.opacity = '0'; }

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
